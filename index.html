<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楊梅擊劍館 · PIXEL FENCING</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    height:100%;
    background:#062235;
    background-image:radial-gradient(circle at 50% 30%, #0d3a52 0%, #062235 60%, #03141f 100%);
    color:#e8f4f8; font-family:'Press Start 2P',monospace;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
    -webkit-font-smoothing:none;
    touch-action:manipulation; -webkit-user-select:none; user-select:none;
  }
  #wrap{ text-align:center; width:100%; max-width:940px; padding:6px; }
  .head{ display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:4px; }
  .head img{ height:42px; image-rendering:auto; filter:drop-shadow(0 0 8px rgba(0,0,0,.5)); }
  h1{ font-size:20px; letter-spacing:1px; color:#c8f560;
      text-shadow:2px 2px 0 #0a4d63, 4px 4px 0 #03141f; }
  #sub{ font-size:8px; color:#5fb3d4; margin-bottom:10px; }
  #bar{ display:flex; justify-content:space-between; align-items:center;
        width:100%; max-width:920px; margin:0 auto 6px; font-size:13px; }
  .p1c{ color:#7fe3ff; } .p2c{ color:#ff8fa3; }
  #score{ font-size:22px; color:#c8f560; }
  /* canvas scales down to fit screen width while keeping aspect ratio */
  #stage{ position:relative; width:100%; max-width:920px; margin:0 auto; }
  canvas{ background:transparent; border:4px solid #0a4d63;
    box-shadow:0 0 0 4px #03141f, 0 0 34px rgba(127,227,255,.18);
    image-rendering:pixelated; display:block; width:100%; height:auto; }
  #controls{ display:flex; justify-content:space-between; width:100%; max-width:920px;
    margin:10px auto 0; font-size:8px; color:#5fb3d4; line-height:1.9; }
  #controls b{ color:#c8f560; }
  kbd{ background:#0a4d63; padding:2px 5px; border-radius:2px; color:#fff;
    border:1px solid #1f8fb5; }
  #diff{ font-size:8px; color:#5fb3d4; margin-top:10px; }
  #diff button{ font-family:inherit; font-size:8px; background:#0a4d63; color:#e8f4f8;
    border:1px solid #1f8fb5; padding:7px 10px; margin:0 3px; cursor:pointer; border-radius:2px; }
  #diff button.on{ background:#c8f560; color:#062235; border-color:#c8f560; }
  #msg{ margin-top:8px; font-size:12px; color:#c8f560; height:16px; }

  /* ---- TOUCH CONTROLS (mobile) ---- */
  #touch{ display:none; width:100%; max-width:920px; margin:10px auto 0;
    justify-content:space-between; align-items:center; gap:10px; }
  .tgroup{ display:flex; gap:10px; }
  .tbtn{ font-family:inherit; -webkit-tap-highlight-color:transparent;
    width:62px; height:62px; border-radius:50%; border:3px solid #1f8fb5;
    background:radial-gradient(circle at 35% 30%, #11405c, #07273a);
    color:#e8f4f8; font-size:8px; line-height:1.2; display:flex;
    flex-direction:column; align-items:center; justify-content:center;
    box-shadow:0 4px 0 #03141f; touch-action:none; cursor:pointer; }
  .tbtn .ic{ font-size:18px; margin-bottom:2px; }
  .tbtn:active{ transform:translateY(2px); box-shadow:0 2px 0 #03141f; background:#155}
  .tbtn.atk{ border-color:#c8f560; }
  .tbtn.par{ border-color:#7fe3ff; }
  /* show touch UI, hide keyboard hints on coarse pointers / small screens */
  @media (pointer:coarse), (max-width:760px){
    #touch{ display:flex; }
    #controls{ display:none; }
    .head img{ height:34px; } h1{ font-size:16px; }
  }

  /* ---- CTA OVERLAY ---- */
  #cta{ display:none; position:fixed; inset:0; z-index:50;
    background:rgba(3,18,28,.92); backdrop-filter:blur(3px);
    align-items:center; justify-content:center; padding:20px; }
  #cta .card{ background:#0a2b40; border:3px solid #c8f560; border-radius:10px;
    max-width:340px; width:100%; padding:24px 20px; text-align:center;
    box-shadow:0 0 40px rgba(200,245,96,.25); }
  #cta img{ height:64px; margin-bottom:10px; }
  #cta .res{ font-size:13px; color:#c8f560; margin-bottom:8px; }
  #cta .hd{ font-size:13px; color:#fff; line-height:1.6; margin-bottom:6px; }
  #cta .tx{ font-size:8px; color:#7fe3ff; line-height:1.9; margin-bottom:16px; }
  #cta a.go{ display:block; font-family:inherit; font-size:11px; text-decoration:none;
    background:#c8f560; color:#062235; padding:14px; border-radius:6px;
    margin-bottom:10px; box-shadow:0 4px 0 #6f9a1f; }
  #cta a.go:active{ transform:translateY(2px); box-shadow:0 2px 0 #6f9a1f; }
  #cta .qr{ background:#fff; padding:8px; border-radius:6px; display:inline-block; margin-bottom:14px; }
  #cta button.again{ font-family:inherit; font-size:9px; background:transparent;
    color:#7fe3ff; border:1px solid #1f8fb5; padding:9px 14px; border-radius:5px; cursor:pointer; }
</style>
</head>

<script>
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
const W=cv.width,H=cv.height, FLOOR=H-72;
const COL={
  p1:'#7fe3ff',p1d:'#1f8fb5',p1k:'#0a4d63',
  p2:'#ff8fa3',p2d:'#d65a72',p2k:'#7a2b3a',
  blade:'#f4f1de',guard:'#cfd8dc',spark:'#c8f560',light:'#c8f560'
};
const WIN=5;
const T={ lungeOut:9, lungeHold:7, lungeBack:18,
  cooldown:22, parryWin:14, riposteWindow:22, hitLamp:40,
  feintOut:5, feintBack:7 };

// AI tuning per difficulty
const AI={
  easy:  { react:26, aggro:0.012, parryChance:0.18, spacing:150, retreat:0.3, feint:0.10 },
  normal:{ react:16, aggro:0.022, parryChance:0.35, spacing:138, retreat:0.45, feint:0.22 },
  hard:  { react:9,  aggro:0.035, parryChance:0.58, spacing:128, retreat:0.6, feint:0.38 }
};
let diff='normal';

function newP(x,facing,side){
  return { x, y:FLOOR, facing, side, state:'engarde', t:0, cooldown:0,
    parry:false, parryT:0, riposteT:0, riposteActive:false,
    bend:0, armExt:0, lunge:0, score:0, lampT:0, hitFlash:0, bob:Math.random()*6.28,
    aiTimer:0, aiIntent:null };
}
let p1,p2,running=false,roundOver=false,freeze=0,matchOver=false;
const touchHeld={fwd:false,back:false};
const msgEl=document.getElementById('msg'), scEl=document.getElementById('score');

function reset(full){
  p1=newP(260,1,'p1'); p2=newP(W-260,-1,'p2');
  if(full){p1.score=0;p2.score=0;}
  roundOver=false; freeze=0; updateScore();
}
function updateScore(){ scEl.textContent=p1.score+' — '+p2.score; }

// unified start / restart (works for keyboard space AND touch tap)
function startOrRestart(){
  if(matchOver){ hideCTA(); }
  if(!running){ running=true; matchOver=false; reset(true); }
  else if(roundOver){ matchOver=false; reset(false); }
  msgEl.textContent='';
}

document.querySelectorAll('#diff button').forEach(b=>{
  b.onclick=()=>{
    diff=b.dataset.d;
    document.querySelectorAll('#diff button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
  };
});

const keys={};
addEventListener('keydown',e=>{
  if(e.code==='Space'){ startOrRestart(); e.preventDefault(); }
  if(!keys[e.code]&&running&&!roundOver&&!freeze) action(e.code);
  keys[e.code]=true;
  if(['ArrowLeft','ArrowRight','ArrowDown','ArrowUp'].includes(e.code)) e.preventDefault();
});
addEventListener('keyup',e=>keys[e.code]=false);

// ---- TOUCH CONTROLS ----
function bindTouch(){
  document.querySelectorAll('#touch .tbtn').forEach(btn=>{
    const act=btn.dataset.act;
    const press=ev=>{
      ev.preventDefault();
      if(!running||roundOver||freeze){ if(act!=='fwd'&&act!=='back') startOrRestart(); return; }
      if(act==='fwd') touchHeld.fwd=true;
      else if(act==='back') touchHeld.back=true;
      else if(act==='lunge') lunge(p1);
      else if(act==='parry') parry(p1);
      else if(act==='feint') feint(p1);
    };
    const release=ev=>{ ev.preventDefault();
      if(act==='fwd') touchHeld.fwd=false;
      if(act==='back') touchHeld.back=false;
    };
    btn.addEventListener('touchstart',press,{passive:false});
    btn.addEventListener('touchend',release,{passive:false});
    btn.addEventListener('touchcancel',release,{passive:false});
    btn.addEventListener('mousedown',press);
    btn.addEventListener('mouseup',release);
    btn.addEventListener('mouseleave',release);
  });
}
bindTouch();

// tap the canvas to start on mobile
document.getElementById('game').addEventListener('touchstart',e=>{
  if(!running||roundOver){ startOrRestart(); }
},{passive:true});

function action(c){
  if(c==='KeyF'||c==='KeyK') lunge(p1);
  if(c==='KeyG'||c==='KeyL') parry(p1);
  if(c==='KeyS'||c==='ArrowDown') feint(p1);
}
function lunge(p){
  if(p.cooldown>0||p.state==='lunge'||p.parry||p.state==='feint') return;
  p.state='lunge'; p.t=0; p.riposteActive=p.riposteT>0;
}
function parry(p){
  if(p.cooldown>0||p.state==='lunge'||p.parry||p.state==='feint') return;
  p.parry=true; p.parryT=T.parryWin; p.state='parry'; p.t=0;
}
// feint: quick fake extension, no scoring, baits a parry then recovers fast
function feint(p){
  if(p.cooldown>0||p.state==='lunge'||p.parry||p.state==='feint') return;
  p.state='feint'; p.t=0;
}
// hand/guard screen position — shared by renderer AND hit detection
function handPos(p){
  const f=p.facing, bend=p.bend, ext=p.armExt, lng=p.lunge;
  const breathe=Math.sin(p.bob)*1.0*(1-bend);
  const drop=bend*14, lean=f*(bend*7);
  const hipY=p.y-70+drop;
  const shoulderY=hipY-34+breathe;
  const tX=p.x+lean;
  const shX=tX+f*8, shY=shoulderY+6;
  const elbowX=shX+f*(10+ext*6+lng*20);
  const handX=elbowX+f*(12+ext*16+lng*30);
  const handY=(shY+2-ext*2)-2;       // matches renderer elbowY-2
  return { x:handX, y:handY, guardX:handX+f*4 };
}
// blade tip: straight forward from the guard, at hand height
function tip(p){
  const h=handPos(p);
  const blade=46+p.armExt*14+p.lunge*46;   // blade length, points forward
  return { x:h.guardX + p.facing*blade, y:h.y };
}

function aiThink(){
  const cfg=AI[diff];
  const me=p2, foe=p1;
  const gap=Math.abs(me.x-foe.x);
  if(me.cooldown>0||me.state==='lunge'||me.parry||me.state==='feint') return;
  if(me.aiTimer>0){ me.aiTimer--; }
  // feint bait: AI may parry a feint (wasting its tempo) — lower difficulty bites more
  if(foe.state==='feint' && gap< cfg.spacing+20){
    if(Math.random()<cfg.parryChance*0.8){ parry(me); return; }
  }
  // react to opponent's incoming lunge -> chance to parry
  if(foe.state==='lunge'&&foe.t<T.lungeOut && gap< cfg.spacing+20){
    if(Math.random()<cfg.parryChance/ (foe.t+1) ){ parry(me); return; }
  }
  // riposte aggressively if window open
  if(me.riposteT>0 && gap< cfg.spacing+30){ lunge(me); return; }
  // spacing behaviour
  me._mv=0;
  if(gap>cfg.spacing+24){ me._mv=me.facing; }            // close in
  else if(gap<cfg.spacing-22){ if(Math.random()<cfg.retreat) me._mv=-me.facing; } // back off
  // occasionally feint before attacking (hard AI more deceptive)
  if(gap< cfg.spacing+8 && Math.random()<cfg.aggro){
    if(Math.random()<cfg.feint){ feint(me); } else { lunge(me); }
  }
}

function update(){
  if(!running||roundOver) return;
  if(freeze>0){freeze--; return;}
  aiThink();
  for(const p of [p1,p2]){
    if(p.cooldown>0)p.cooldown--;
    if(p.riposteT>0)p.riposteT--;
    if(p.lampT>0)p.lampT--;
    if(p.hitFlash>0)p.hitFlash--;
    p.bob+=0.12;
    if(p.state==='engarde'&&!p.parry){
      let mv=0;
      if(p.side==='p1'){
        if(keys['KeyD']||keys['ArrowRight']||touchHeld.fwd) mv+=p.facing;
        if(keys['KeyA']||keys['ArrowLeft']||touchHeld.back) mv-=p.facing;
      } else { mv=p._mv||0; }
      p.x+=mv*2.0; p.x=Math.max(70,Math.min(W-70,p.x));
      p.armExt+=((mv>0?0.35:0.15)-p.armExt)*0.2;
    }
    if(p.parry){
      p.parryT--; p.armExt+=(0.55-p.armExt)*0.3;
      if(p.parryT<=0){p.parry=false;p.state='engarde';p.cooldown=8;}
    }
    if(p.state==='lunge'){
      p.t++;
      const fast=p.riposteActive?0.7:1;
      const out=T.lungeOut*fast,hold=T.lungeHold,back=T.lungeBack;
      if(p.t<out){p.lunge=p.t/out;p.bend=p.t/out;p.armExt=1;}
      else if(p.t<out+hold){p.lunge=1;p.bend=1;}
      else if(p.t<out+hold+back){const k=(p.t-out-hold)/back;p.lunge=1-k;p.bend=1-k;p.armExt=1-k*0.6;}
      else{p.state='engarde';p.lunge=0;p.bend=0;p.cooldown=T.cooldown;p.riposteActive=false;}
    } else if(p.state==='feint'){
      p.t++;
      const out=T.feintOut, back=T.feintBack;
      // small arm extension, NO lunge step, NO scoring
      if(p.t<out){p.armExt=0.5+0.5*(p.t/out); p.bend=0.15;}
      else if(p.t<out+back){const k=(p.t-out)/back; p.armExt=1-k*0.5; p.bend=0.15*(1-k);}
      else{p.state='engarde'; p.bend=0; p.cooldown=8;}
    } else {
      p.lunge+=(0-p.lunge)*0.3; p.bend+=(0-p.bend)*0.3;
      if(!p.parry) p.armExt+=(Math.max(0,p.armExt-0.02)-p.armExt)*0.1;
    }
  }
  p1.facing=p1.x<=p2.x?1:-1;
  p2.facing=p2.x<p1.x?1:-1;
  tryTouch(p1,p2); tryTouch(p2,p1);
}
function isAttacking(p){
  return p.state==='lunge'&&p.t>=T.lungeOut-3&&p.t<=T.lungeOut+T.lungeHold+1;
}
function tryTouch(att,def){
  if(!isAttacking(att)) return;
  const h=handPos(att), tp=tip(att), tx=def.x, f=att.facing;
  const torsoTop=def.y-104, torsoBot=def.y-36, half=15;
  // hit zone spans from the attacker's own body out to the blade tip,
  // so both close-range (body overlap) and lunge-reach register
  const fromX = att.x;                       // attacker torso x
  const toX   = tp.x;                         // blade tip x
  const zoneMinX=Math.min(fromX,toX), zoneMaxX=Math.max(fromX,toX);
  const inHeight = tp.y>torsoTop && tp.y<torsoBot;
  const overlapX = zoneMaxX >= tx-half && zoneMinX <= tx+half;
  const inFront = (f>0 && def.x>att.x) || (f<0 && def.x<att.x);
  if(inHeight && overlapX && inFront){
    const facing=(def.facing>0&&att.x>def.x)||(def.facing<0&&att.x<def.x);
    if(def.parry&&facing){
      def.riposteT=T.riposteWindow; def.parry=false; def.state='engarde'; def.cooldown=6;
      att.state='engarde'; att.lunge=0; att.bend=0; att.cooldown=T.cooldown+8;
      spark(tp.x,tp.y); msgEl.textContent='PARRY!';
      setTimeout(()=>{if(!roundOver)msgEl.textContent='';},500); freeze=4; return;
    }
    att.score++; def.lampT=T.hitLamp; def.hitFlash=14;
    att.state='engarde'; att.lunge=0; att.bend=0; att.cooldown=T.cooldown;
    updateScore(); spark(tp.x,tp.y); freeze=10;
    if(att.score>=WIN){
      roundOver=true; matchOver=true;
      const won = att.side==='p1';
      msgEl.textContent = won ? '你獲勝！ VICTOIRE' : 'AI 獲勝';
      setTimeout(()=>showCTA(won), 700);
    } else {
      msgEl.textContent=att.side==='p1'?'TOUCHE! 得分':'被刺中！';
      roundOver=true;
      setTimeout(()=>{
        if(p1.score<WIN&&p2.score<WIN){
          p1.x=260;p2.x=W-260; p1.state=p2.state='engarde';
          p1.lunge=p2.lunge=0; p1.cooldown=p2.cooldown=12;
          roundOver=false; msgEl.textContent='';
        }
      },800);
    }
  }
}
let sparks=[];
function spark(x,y){for(let i=0;i<12;i++)sparks.push({x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.7)*5,life:16});}

// ambient floating particles (matches banner)
let dust=[];
for(let i=0;i<40;i++) dust.push({x:Math.random()*W,y:Math.random()*H,
  s:Math.random()*1.5+0.5, vy:-(Math.random()*0.3+0.1), a:Math.random()});

function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),w,h);}
function rrect(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); }

// realistic-proportion fencer
function drawFencer(p){
  const f=p.facing;
  const hit = p.hitFlash>0 && Math.floor(p.hitFlash/2)%2===0;
  // P1 = white jacket fencer, P2 = dark/navy jacket fencer (like reference)
  const isWhite = p.side==='p1';
  const suit  = hit ? '#ffd23f' : (isWhite ? '#eef3f6' : '#2c3550');
  const suitSh= isWhite ? '#c4ced6' : '#1b2238';
  const pants = isWhite ? '#e2e9ee' : '#222a42';
  const pantsSh=isWhite ? '#b9c4cd' : '#161c30';
  const accent= isWhite ? COL.p1 : COL.p2;     // club color trim
  const shoe  = isWhite ? '#ffffff' : '#3a4258';
  const shoeC = isWhite ? '#cfd8e0' : '#3a4258';
  const skin  = '#d9a98a';

  const x=p.x, y=p.y, bend=p.bend, ext=p.armExt, lng=p.lunge;
  const breathe = Math.sin(p.bob)*1.0*(1-bend);

  // overall body lowers slightly + leans during lunge
  const drop = bend*14;
  const lean = f*(bend*7);
  const hipY = y - 70 + drop;          // hip height (taller than before)
  const shoulderY = hipY - 34 + breathe;
  const tX = x + lean;                 // torso x with forward lean

  ctx.lineCap='round'; ctx.lineJoin='round';

  // ---------- LEGS ----------
  // back leg (drive leg) - extends straight back on lunge
  const backFootX = x - f*(18 + lng*58);
  ctx.strokeStyle=pantsSh; ctx.lineWidth=11;
  ctx.beginPath();
  ctx.moveTo(x - f*5, hipY+2);
  ctx.lineTo((x - f*5 + backFootX)/2, hipY+24);   // knee
  ctx.lineTo(backFootX, y-4);
  ctx.stroke();
  // back shoe
  rrect(backFootX-(f>0?12:2), y-6, 14, 7, shoeC);

  // front leg - bends deeply on lunge (thigh near-horizontal)
  const frontFootX = x + f*(26 + lng*78);
  const fKneeX = x + f*(16 + lng*46);
  const fKneeY = hipY + 22 + bend*4;
  ctx.strokeStyle=pants; ctx.lineWidth=12;
  ctx.beginPath();
  ctx.moveTo(x + f*5, hipY+2);
  ctx.lineTo(fKneeX, fKneeY);          // thigh
  ctx.lineTo(frontFootX, y-4);         // shin (vertical-ish)
  ctx.stroke();
  // front shoe
  rrect(frontFootX-(f>0?2:12), y-6, 16, 7, shoe);
  rrect(frontFootX-(f>0?2:12), y-2, 16, 3, accent); // colored sole stripe

  // ---------- TORSO (jacket) ----------
  // hips
  rrect(tX-9, hipY-2, 18, 8, suitSh);
  // jacket body - slight taper, leaning forward
  ctx.fillStyle=suit;
  ctx.beginPath();
  ctx.moveTo(tX-10, hipY+2);
  ctx.lineTo(tX+10, hipY+2);
  ctx.lineTo(tX+9+f*lean*0.2, shoulderY);
  ctx.lineTo(tX-9+f*lean*0.2, shoulderY);
  ctx.closePath(); ctx.fill();
  // shaded back edge
  rrect(tX-10, shoulderY, 4, hipY+2-shoulderY, suitSh);
  // chest plastron seam + club accent line
  ctx.strokeStyle=accent; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(tX-f*8, shoulderY+4); ctx.lineTo(tX+f*6, hipY-4); ctx.stroke();

  // ---------- BACK ARM (raised, bent, balance) ----------
  const baShX = tX - f*7;
  ctx.strokeStyle=suit; ctx.lineWidth=7;
  ctx.beginPath();
  ctx.moveTo(baShX, shoulderY+4);
  ctx.lineTo(baShX - f*10, shoulderY-10-bend*6);   // upper arm up
  ctx.lineTo(baShX - f*4,  shoulderY-22-bend*10);  // forearm, hand up high
  ctx.stroke();
  rrect(baShX-f*4-3, shoulderY-26-bend*10, 6, 6, suitSh); // back glove

  // ---------- HEAD / MASK ----------
  const hx = tX + f*3, hy = shoulderY - 20;
  // neck
  rrect(tX-3, shoulderY-6, 8, 8, skin);
  // mask shell (rounded)
  ctx.fillStyle=suit;
  ctx.beginPath(); ctx.arc(hx, hy, 11, 0, Math.PI*2); ctx.fill();
  rrect(hx-11, hy-2, 22, 13, suit);           // back of head box
  // mask mesh (front, facing opponent) - darker with grid
  ctx.fillStyle='#23282f';
  ctx.beginPath();
  ctx.moveTo(hx+f*2, hy-10);
  ctx.lineTo(hx+f*13, hy-4);
  ctx.lineTo(hx+f*13, hy+9);
  ctx.lineTo(hx+f*2, hy+11);
  ctx.closePath(); ctx.fill();
  // mesh lines
  ctx.strokeStyle='#4a525e'; ctx.lineWidth=1;
  for(let i=-3;i<=8;i+=3){ ctx.beginPath(); ctx.moveTo(hx+f*5, hy+i); ctx.lineTo(hx+f*13, hy+i-2); ctx.stroke(); }
  // bib under mask
  rrect(hx-6, hy+9, 12, 5, suitSh);
  // small club color crest on mask top
  rrect(hx-4, hy-12, 8, 3, accent);

  // ---------- SWORD ARM + BLADE ----------
  const shX = tX + f*8, shY = shoulderY+6;
  const elbowX = shX + f*(10 + ext*6 + lng*20);
  const elbowY = shY + 2 - ext*2;
  const hp = handPos(p);
  const handX = hp.x, handY = hp.y;
  ctx.strokeStyle=suit; ctx.lineWidth=7;
  ctx.beginPath();
  ctx.moveTo(shX, shY); ctx.lineTo(elbowX, elbowY); ctx.lineTo(handX, handY);
  ctx.stroke();
  // glove
  rrect(handX-4, handY-4, 8, 8, isWhite?'#ffffff':'#cfd8e0');
  // bell guard
  ctx.fillStyle='#b8c2cc';
  ctx.beginPath(); ctx.arc(hp.guardX, handY, 5, 0, Math.PI*2); ctx.fill();
  // blade — straight forward toward opponent, at hand height
  const tp=tip(p);
  ctx.strokeStyle=COL.blade; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(hp.guardX, handY); ctx.lineTo(tp.x, tp.y); ctx.stroke();
  rrect(tp.x-1, tp.y-1, 3, 3, '#ffffff');

  // parry shimmer (vertical guard in front of hand)
  if(p.parry){
    ctx.strokeStyle='rgba(200,245,96,'+(0.5+0.35*Math.sin(Date.now()/60))+')'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(hp.guardX, handY-16); ctx.lineTo(hp.guardX, handY+16); ctx.stroke();
  }

  // scoring lamp floating above
  if(p.lampT>0 && Math.floor(p.lampT/4)%2===0){
    const lc = isWhite ? '#7fe3ff' : '#ff5a6e';
    rrect(x-6, y-150, 12, 12, lc);
    ctx.fillStyle = isWhite?'rgba(127,227,255,.3)':'rgba(255,90,110,.3)';
    ctx.beginPath(); ctx.arc(x, y-144, 18, 0, 6.28); ctx.fill();
  }
}

// ---------- ARENA BACKGROUND ----------
let crowd=null;
function buildCrowd(){
  crowd=document.createElement('canvas'); crowd.width=W; crowd.height=150;
  const c=crowd.getContext('2d');
  c.fillStyle='#0a1420'; c.fillRect(0,0,W,150);
  // tiered stands
  for(let row=0; row<9; row++){
    const yy=8+row*15;
    c.fillStyle = row%2? '#13202f':'#0f1a27';
    c.fillRect(0,yy,W,14);
    for(let i=0;i<W;i+=7){
      const r=Math.random();
      let col = r<0.33?'#1f3346': r<0.66?'#26405a':'#33526f';
      if(Math.random()<0.06) col='#c8f560';
      if(Math.random()<0.05) col='#ff8fa3';
      c.fillStyle=col; c.fillRect(i+Math.random()*2, yy+2+Math.random()*6, 4,5);
    }
  }
  // spotlights
  for(let s=0;s<5;s++){ const sx=80+s*180;
    c.fillStyle='rgba(255,255,255,0.07)';
    c.beginPath(); c.moveTo(sx,0); c.lineTo(sx-40,150); c.lineTo(sx+40,150); c.closePath(); c.fill();
    c.fillStyle='#fffbe0'; c.fillRect(sx-3,0,6,5);
  }
}

function drawScoreboard(){
  // top center timer + names + scores, like the reference
  const bx=W/2-150, bw=300, bh=26;
  ctx.fillStyle='#0a2540'; ctx.fillRect(bx,8,bw,bh);
  ctx.fillStyle='#1f8fb5'; ctx.fillRect(bx,8,bw,3);
  ctx.fillStyle='#c8f560'; ctx.font='14px "Press Start 2P"'; ctx.textAlign='center';
  ctx.fillText(p1.score+'  '+p2.score, W/2, 28);
  ctx.font='8px "Press Start 2P"';
  ctx.fillStyle='#7fe3ff'; ctx.textAlign='left';  ctx.fillText('YOU', bx-44, 26);
  ctx.fillStyle='#ff8fa3'; ctx.textAlign='right'; ctx.fillText('AI',  bx+bw+40, 26);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // hall gradient
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a1828'); g.addColorStop(0.5,'#0d2438'); g.addColorStop(1,'#06121d');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // crowd stands (top)
  if(!crowd) buildCrowd();
  ctx.drawImage(crowd,0,0);

  // sponsor banner board behind piste
  const boardY=FLOOR-86;
  ctx.fillStyle='#0e2c44'; ctx.fillRect(0,boardY,W,30);
  ctx.fillStyle='#15406280'; ctx.fillRect(0,boardY,W,4);
  ctx.fillStyle='#5fb3d4'; ctx.font='9px "Press Start 2P"'; ctx.textAlign='center';
  ctx.fillText('YANGMEI  FENCING  CLUB', W*0.25, boardY+20);
  ctx.fillStyle='#c8f560';
  ctx.fillText('FENCING  CHAMPIONSHIP', W*0.74, boardY+20);

  // floor base
  ctx.fillStyle='#0a3046'; ctx.fillRect(0,boardY+30,W,H-(boardY+30));

  // PISTE - blue/yellow like reference
  const py=FLOOR-44;
  ctx.fillStyle='#2f6fae'; ctx.fillRect(40,py,W-80,52);          // blue piste
  ctx.fillStyle='#f2c84b'; ctx.fillRect(40,py+8,W-80,30);        // yellow strip
  ctx.fillStyle='#2f6fae'; ctx.fillRect(40,py+16,W-80,14);       // blue center lane
  // piste edges
  ctx.fillStyle='#1f4f80'; ctx.fillRect(40,py,W-80,3);
  ctx.fillStyle='#1f4f80'; ctx.fillRect(40,py+49,W-80,3);
  // center + en garde lines
  ctx.fillStyle='#eef3f6'; ctx.fillRect(W/2-1,py,2,52);
  ctx.fillStyle='#eef3f680'; ctx.fillRect(W/2-120,py,2,52);
  ctx.fillStyle='#eef3f680'; ctx.fillRect(W/2+118,py,2,52);

  // ambient sparks/dust
  dust.forEach(d=>{ ctx.globalAlpha=0.12+0.2*Math.abs(Math.sin(d.a+Date.now()/700));
    rrect(d.x,d.y,d.s,d.s,'#7fe3ff'); d.y+=d.vy; if(d.y<150){d.y=H;d.x=Math.random()*W;} });
  ctx.globalAlpha=1;

  if(!running){
    drawScoreboard();
    ctx.fillStyle='#c8f560'; ctx.font='14px "Press Start 2P"'; ctx.textAlign='center';
    ctx.fillText('PRESS SPACE — EN GARDE',W/2,H/2+10);
    ctx.fillStyle='#5fb3d4'; ctx.font='8px "Press Start 2P"';
    ctx.fillText('YANGMEI FENCING CLUB',W/2,H/2+34);
    return;
  }

  const order=p1.x<p2.x?[p1,p2]:[p2,p1];
  drawFencer(order[0]); drawFencer(order[1]);

  sparks.forEach(s=>{ctx.globalAlpha=s.life/16;rrect(s.x,s.y,2,2,COL.spark);});
  ctx.globalAlpha=1;
  sparks.forEach(s=>{s.x+=s.vx;s.y+=s.vy;s.vy+=0.3;s.life--;});
  sparks=sparks.filter(s=>s.life>0);

  drawScoreboard();
}

// ---- CTA OVERLAY ----
const ctaEl=document.getElementById('cta');
function showCTA(won){
  document.getElementById('ctaRes').textContent = won ? 'VICTOIRE! 你贏了' : '再接再厲！';
  ctaEl.style.display='flex';
}
function hideCTA(){ ctaEl.style.display='none'; }
document.getElementById('ctaAgain').addEventListener('click',()=>{ hideCTA(); startOrRestart(); });

function loop(){ update(); draw(); requestAnimationFrame(loop); }
reset(true); running=false; loop();
</script>
